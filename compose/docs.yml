services:
  mkdocs:
    image: dockerregistry.metaways.net/tine20/tine20/mkdocs:1${IMAGE_SUFFIX}
    restart: unless-stopped
    volumes:
      - ./tine20:/docs
    tmpfs:
      - /docs/docs/developers/api/
    networks:
      - external_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.mkdocs.rule=Host(`docs.local.tine-dev.de`)
      - traefik.http.routers.mkdocs.entrypoints=websecure
      - traefik.http.routers.mkdocs.tls=true
      - traefik.http.services.mkdocs.loadbalancer.server.port=8000

      - traefik.http.middlewares.mkdocs-cors.headers.accesscontrolalloworiginlist=*
      - traefik.http.middlewares.mkdocs-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST
      - traefik.http.middlewares.mkdocs-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.mkdocs-cors.headers.accesscontrolallowcredentials=true

      - traefik.http.middlewares.mkdocs-cors.headers.addvaryheader=true

      - traefik.http.routers.mkdocs.middlewares=mkdocs-cors
  web:
    volumes:
      - ./configs/docs/docs.inc.php:/etc/tine20/conf.d/docs.inc.php:ro
